<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ナオルス シューティング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body {
    height: 100%;
    height: 100dvh;
    background: #f7c5d0;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; }
  canvas { background: #fcdce4; box-shadow: 0 10px 40px rgba(214,120,145,.45); border-radius: 18px; touch-action: none; }
  #ui { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .panel {
    pointer-events: auto; background: rgba(255,255,255,.88);
    border: 3px solid #f49bb3; border-radius: 22px; padding: 22px 28px;
    text-align: center; color: #c34d6c; max-width: 88%;
    box-shadow: 0 8px 30px rgba(195,77,108,.3);
  }
  .panel h1 { font-size: 23px; margin-bottom: 6px; letter-spacing: 1px; }
  .panel .sub { font-size: 13px; color: #d98aa0; margin-bottom: 12px; line-height: 1.7; }
  .panel .big { font-size: 38px; font-weight: bold; color: #e26a8d; margin: 4px 0; }
  .panel .row { font-size: 15px; margin: 3px 0; color: #b65072; }
  .legend { font-size: 12px; color: #b65072; margin: 8px 0 2px; line-height: 1.9; text-align: left; display: inline-block; }
  button.btn {
    pointer-events: auto; margin-top: 12px; border: none;
    background: linear-gradient(180deg, #ff90ad, #f2718f); color: #fff;
    font-size: 18px; font-weight: bold; padding: 12px 36px; border-radius: 999px;
    cursor: pointer; box-shadow: 0 5px 0 #d9577a, 0 8px 16px rgba(217,87,122,.4);
    transition: transform .05s, box-shadow .05s; font-family: inherit;
  }
  button.btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d9577a; }
  .hidden { display: none !important; }
  .hint { font-size: 12px; color: #d98aa0; margin-top: 10px; line-height: 1.6; }
  #touch { position: absolute; inset: 0; pointer-events: none; touch-action: none; }
  .pad-l { position: absolute; left: calc(16px + env(safe-area-inset-left)); bottom: calc(24px + env(safe-area-inset-bottom)); display: grid;
    grid-template-columns: repeat(3,58px); grid-template-rows: repeat(3,58px); gap: 7px; pointer-events: auto; }
  .pad-r { position: absolute; right: calc(22px + env(safe-area-inset-right)); bottom: calc(40px + env(safe-area-inset-bottom)); pointer-events: auto; }
  .tbtn { border-radius: 16px; background: rgba(255,255,255,.6); border: 3px solid #f49bb3;
    color: #c34d6c; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(195,77,108,.25);
    touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  .tbtn.pressed, .tbtn:active { background: rgba(255,180,200,.95); transform: scale(0.94); }
  #upBtn{ grid-column:2; grid-row:1; } #leftBtn{ grid-column:1; grid-row:2; }
  #rightBtn{ grid-column:3; grid-row:2; } #downBtn{ grid-column:2; grid-row:3; }
  #fireBtn { width: 92px; height: 92px; border-radius: 50%; font-size: 34px; }
  @media (hover:hover) and (pointer:fine) { #touch { display: none; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="startPanel" class="panel">
      <h1>🌸 ナオルス シューティング 🌸</h1>
      <div class="sub">ピンクの恐竜「ナオルス」が<br>ホネを発射して、おそってくる敵を撃退！</div>
      <div class="legend">
        🦴 パワー：ホネが増える（最大5方向）<br>
        💉 注射器：連射スピードアップ<br>
        🛡 バリア：一定時間 無敵<br>
        ♥ ハート：ライフ回復<br>
        🩺 Wave 3 と Wave 5 に ドクターボス が登場！
      </div>
      <br>
      <button class="btn" id="startBtn">スタート</button>
      <div class="hint">PC：↑ ↓ ← → で移動　SPACE で発射<br>スマホ：画面下のボタンで操作</div>
    </div>
    <div id="overPanel" class="panel hidden">
      <h1 id="overTitle">GAME OVER</h1>
      <div class="row">SCORE</div>
      <div class="big" id="finalScore">0</div>
      <div class="row">ハイスコア: <span id="finalHigh">0</span></div>
      <button class="btn" id="againBtn">もう一度</button>
    </div>
    <div id="clearPanel" class="panel hidden">
      <h1>🎉 5ウェーブ クリア！ 🎉</h1>
      <div class="sub">ナオルス、やったね！<br>ぜんぶの敵とボスを撃退したよ！</div>
      <div class="row">SCORE</div>
      <div class="big" id="clearScore">0</div>
      <div class="row">ハイスコア: <span id="clearHigh">0</span></div>
      <button class="btn" id="clearBtn">もう一度</button>
    </div>
  </div>
  <div id="touch" class="hidden">
    <div class="pad-l">
      <div class="tbtn" id="upBtn">▲</div>
      <div class="tbtn" id="leftBtn">◀</div>
      <div class="tbtn" id="rightBtn">▶</div>
      <div class="tbtn" id="downBtn">▼</div>
    </div>
    <div class="pad-r"><div class="tbtn" id="fireBtn">🦴</div></div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // prevent iOS zoom: pinch (gesture*) and double-tap
  ["gesturestart","gesturechange","gestureend"].forEach(ev=>
    document.addEventListener(ev, e=>e.preventDefault(), {passive:false}));
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e=>{
    const now = Date.now();
    if (now - lastTouchEnd <= 350) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});

  const W = 760, H = 440;
  function fit() {
    const pad = 16;
    const aw = window.innerWidth - pad, ah = window.innerHeight - pad;
    let scale = Math.min(aw / W, ah / H, 1.6);
    canvas.style.width = (W*scale)+"px"; canvas.style.height = (H*scale)+"px";
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", fit); fit();

  const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.getElementById("touch").classList.remove("hidden");

  function loadHigh(){ try { return parseInt(localStorage.getItem("naorusuHigh")||"0",10)||0; } catch(e){ return 0; } }
  function saveHigh(v){ try { localStorage.setItem("naorusuHigh", String(v)); } catch(e){} }

  const STATE = { START:0, PLAY:1, OVER:2, CLEAR:3 };
  let state = STATE.START;

  let score = 0, high = loadHigh(), wave = 1, lives = 3;
  let powerLevel = 1, rapidTimer = 0, barrierTimer = 0;
  let clearTime = 0;

  const player = { x: 110, y: H/2, w: 90, h: 70, speed: 4.5, cooldown: 0 };

  let bones = [], enemyShots = [], enemies = [], items = [], particles = [], petals = [];
  let boss = null;
  let toSpawn = 0, spawnTimer = 0, flashTimer = 0;

  const keys = { left:false, right:false, up:false, down:false, fire:false };

  // ---------- petals ----------
  function makePetal() {
    return { x: Math.random()*W, y:-10-Math.random()*H, r:5+Math.random()*6,
      vy:0.4+Math.random()*0.8, vx:-(0.3+Math.random()*0.7),
      rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.03, a:0.5+Math.random()*0.4 };
  }
  for (let i=0;i<26;i++){ const p=makePetal(); p.y=Math.random()*H; petals.push(p); }
  function updatePetals() {
    for (const p of petals){ p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;
      if (p.y>H+10 || p.x<-10){ Object.assign(p, makePetal()); p.x=W+10; p.y=Math.random()*H; } }
  }
  function drawPetal(p) {
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=p.a; ctx.fillStyle="#f6a8bd";
    ctx.beginPath(); ctx.moveTo(0,-p.r);
    ctx.quadraticCurveTo(p.r*0.9,-p.r*0.2,0,p.r); ctx.quadraticCurveTo(-p.r*0.9,-p.r*0.2,0,-p.r);
    ctx.fill(); ctx.restore(); ctx.globalAlpha=1;
  }

  // ---------- waves / boss ----------
  function spawnWave(){
    if (wave === 3 || wave >= 5){ spawnBoss(); toSpawn = 0; }
    else { toSpawn = 6 + wave*2; spawnTimer = 40; }
  }
  function spawnEnemy(){
    const types = ["jelly","ghost","bug"];
    const y = 50 + Math.random()*(H-100);
    enemies.push({ x:W+30, y, baseY:y, w:38, h:34, alive:true,
      type: types[Math.floor(Math.random()*types.length)],
      vx:-(0.9 + wave*0.18 + Math.random()*0.4), amp:18+Math.random()*26,
      wob:Math.random()*Math.PI*2, fireT:60+Math.random()*90 });
  }
  function spawnBoss(){
    const hp = 60 + wave*14;
    boss = { x:W+140, y:H/2, tx:W-140, w:120, h:120, hp, maxHp:hp, vy:1.7, fireT:80, alive:true, t:0, enter:true };
  }

  // ---------- Naorusu (faithful to the picture), facing RIGHT ----------
  function drawDino(x, y, flash) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(-1, 1);            // side profile faces right
    ctx.lineWidth = 3; ctx.lineJoin = "round"; ctx.lineCap = "round";
    const line = "#5b3a45";
    const body = flash ? "#ffd3df" : "#f3a8bb";
    const belly = flash ? "#fff0f4" : "#fcdce6";
    const scute = flash ? "#f6b6c8" : "#ee8aa6";
    ctx.strokeStyle = line;

    // ---- tail (thick, curving up to a point) ----
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(10,-4);
    ctx.quadraticCurveTo(60,-34, 86,-14);
    ctx.quadraticCurveTo(70,-2, 60,10);
    ctx.quadraticCurveTo(46,24, 12,18);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // ---- back leg ----
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(15, 37, 12, 16, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    drawClaws(6, 51);

    // ---- body (plump) ----
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(-3, 10, 33, 31, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    // ---- belly (subtle, lighter) ----
    ctx.fillStyle = belly;
    ctx.beginPath(); ctx.ellipse(-16, 18, 18, 22, -0.1, 0, Math.PI*2); ctx.fill();

    // ---- front leg ----
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(-16, 40, 12, 16, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    drawClaws(-25, 54);

    // ---- arm holding syringe ----
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(-29, 16, 6, 10, 0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    drawSyringe(-37, 26);

    // ---- head (large, rounded) ----
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(-11, -21, 28, 25, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    // ---- dorsal bumps (rounded humps, neck -> tail, tapering) ----
    ctx.fillStyle = scute; ctx.lineWidth = 2;
    const sc = [[3,-23,8.5],[15,-19,7.6],[28,-16,6.7],[41,-16,5.8],[53,-19,4.7],[63,-23,3.6]];
    for (const [sx,sy,r] of sc){
      ctx.beginPath(); ctx.arc(sx, sy, r, Math.PI*1.04, Math.PI*-0.04); ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
    ctx.lineWidth = 3;

    // ---- open smiling mouth (interior), upper teeth, clenched bone ----
    // mouth interior
    ctx.fillStyle = "#bb5d7b"; ctx.strokeStyle = line; ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-39,-13);
    ctx.quadraticCurveTo(-24,-9,-9,-14);
    ctx.quadraticCurveTo(-22,3,-39,-13);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // tongue hint
    ctx.fillStyle = "#e389a0";
    ctx.beginPath(); ctx.ellipse(-22,-4,7,3.5,0,0,Math.PI*2); ctx.fill();
    // upper teeth (triangles hanging from the upper lip)
    ctx.fillStyle = "#fff";
    for (let i=0;i<4;i++){ const tx=-37+i*8;
      ctx.beginPath(); ctx.moveTo(tx,-13); ctx.lineTo(tx+5,-13); ctx.lineTo(tx+2.5,-8); ctx.closePath();
      ctx.fill(); ctx.stroke(); }
    // bone clenched across the mouth (knobs on both ends)
    ctx.fillStyle = "#fff7e6";
    roundedBone(-53,-15, 34, 7);

    // ---- big eye + highlight ----
    ctx.fillStyle = "#3a2630";
    ctx.beginPath(); ctx.arc(-15,-23, 7.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-17.5,-25.5, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-12.6,-20, 1.2, 0, Math.PI*2); ctx.fill();
    // nostril
    ctx.fillStyle = "#5b3a45";
    ctx.beginPath(); ctx.arc(-34,-21, 1.3, 0, Math.PI*2); ctx.fill();
    // cheek blush
    ctx.fillStyle = "rgba(238,114,148,.55)";
    ctx.beginPath(); ctx.arc(-4,-14, 5.6, 0, Math.PI*2); ctx.fill();

    // ---- sakura flower on head (rose pink, upper-left) ----
    drawSakura(2,-41, 9);

    ctx.restore();
  }
  function drawClaws(x, y){
    ctx.save();
    ctx.fillStyle = "#6a5560"; ctx.strokeStyle = "#4a3a44"; ctx.lineWidth = 1;
    for (let i=0;i<3;i++){ const cx=x+i*6;
      ctx.beginPath(); ctx.moveTo(cx,y-3); ctx.lineTo(cx+4,y-3); ctx.lineTo(cx+2,y+4); ctx.closePath(); ctx.fill(); }
    ctx.restore();
  }
  function roundedBone(x, y, w, h){
    ctx.save(); ctx.translate(x,y); ctx.lineWidth=2.2; ctx.strokeStyle="#5b3a45";
    ctx.beginPath();
    ctx.arc(0,0,h*0.7,0,Math.PI*2); ctx.arc(0,h*0.9,h*0.7,0,Math.PI*2);
    ctx.arc(w,0,h*0.7,0,Math.PI*2); ctx.arc(w,h*0.9,h*0.7,0,Math.PI*2);
    ctx.fill(); ctx.fillRect(0,-1,w,h*1.2); ctx.strokeRect(0,-1,w,h*1.2);
    ctx.restore();
  }
  function drawSyringe(x, y){
    ctx.save(); ctx.translate(x,y); ctx.rotate(0.5);
    ctx.lineWidth = 1.6; ctx.strokeStyle = "#5b3a45";
    ctx.fillStyle = "#bfe0f5"; ctx.fillRect(-3,-2,7,15); ctx.strokeRect(-3,-2,7,15);
    ctx.fillStyle = "#9cc9ee"; ctx.fillRect(-3,5,7,8);
    ctx.fillStyle = "#eef6fc"; ctx.fillRect(-3,-7,7,5); ctx.strokeRect(-3,-7,7,5);
    ctx.beginPath(); ctx.moveTo(0.5,-7); ctx.lineTo(0.5,-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3,-12); ctx.lineTo(4,-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0.5,13); ctx.lineTo(0.5,20); ctx.stroke();
    ctx.restore();
  }
  function drawSakura(x, y, r){
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle = "#ed6f97"; ctx.strokeStyle = "#d65f84"; ctx.lineWidth = 1.4;
    for (let i=0;i<5;i++){
      ctx.save(); ctx.rotate(i*(Math.PI*2/5));
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.quadraticCurveTo(r*0.7,-r*0.95,0,-r*1.45);
      ctx.quadraticCurveTo(-r*0.7,-r*0.95,0,0);
      ctx.fill(); ctx.stroke(); ctx.restore();
    }
    ctx.fillStyle = "#ffe27a"; ctx.beginPath(); ctx.arc(0,0,r*0.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- enemies ----------
  function drawEnemy(e){
    ctx.save(); ctx.translate(e.x,e.y);
    ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.strokeStyle="#5a3a44";
    if (e.type==="jelly"){
      ctx.fillStyle="#c98bd6";
      ctx.beginPath(); ctx.arc(0,0,16,Math.PI,0); ctx.lineTo(16,6);
      for (let i=0;i<4;i++){ ctx.quadraticCurveTo(12-i*8,12,8-i*8,6); }
      ctx.lineTo(-16,0); ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.type==="ghost"){
      ctx.fillStyle="#f29ad0";
      ctx.beginPath(); ctx.arc(0,-2,15,Math.PI,0); ctx.lineTo(15,10);
      ctx.lineTo(8,5); ctx.lineTo(0,10); ctx.lineTo(-8,5); ctx.lineTo(-15,10);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillStyle="#8fbef0";
      ctx.beginPath(); ctx.ellipse(0,0,16,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-6,-12); ctx.lineTo(-10,-20);
      ctx.moveTo(6,-12); ctx.lineTo(10,-20); ctx.stroke();
    }
    ctx.fillStyle="#3a2630";
    ctx.beginPath(); ctx.arc(-5,-1,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-1,2.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(-5.8,-1.8,0.9,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.2,-1.8,0.9,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- boss: friendly orthopedic-clinic doctor (faces left toward player) ----------
  function drawBoss(b){
    ctx.save(); ctx.translate(b.x, b.y);
    const bob = Math.sin(b.t*1.4)*3;
    ctx.translate(0, bob);
    ctx.lineWidth=3.5; ctx.lineJoin="round"; ctx.lineCap="round";
    const ink = "#5a4a52";

    // ---- white coat (body) ----
    ctx.strokeStyle=ink; ctx.fillStyle="#fbfcff";
    ctx.beginPath(); ctx.ellipse(0,22,50,42,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // pink shirt under the coat (V opening)
    ctx.fillStyle="#ffd6e2";
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-16,38); ctx.lineTo(16,38); ctx.closePath(); ctx.fill();
    // coat lapels
    ctx.strokeStyle=ink; ctx.lineWidth=2.6;
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-20,40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(20,40); ctx.stroke();
    // pocket + sakura badge
    ctx.strokeRect(16,18,18,14);
    drawSakura(25,11,4);
    // buttons
    ctx.fillStyle=ink;
    ctx.beginPath(); ctx.arc(0,20,1.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,32,1.6,0,Math.PI*2); ctx.fill();

    // ---- stethoscope ----
    ctx.strokeStyle="#33414f"; ctx.lineWidth=3.4;
    ctx.beginPath(); ctx.moveTo(-9,-8); ctx.quadraticCurveTo(-22,4,-16,20);
    ctx.quadraticCurveTo(-12,32,-2,34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-8); ctx.quadraticCurveTo(16,2,12,12); ctx.stroke();
    ctx.fillStyle="#cfd6dd"; ctx.strokeStyle="#33414f"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-1,37,6,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // ---- arm holding reflex hammer ----
    ctx.fillStyle="#fbfcff"; ctx.strokeStyle=ink; ctx.lineWidth=3.2;
    ctx.beginPath(); ctx.ellipse(-44,24,9,13,0.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle="#8a6a4a"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-50,30); ctx.lineTo(-60,46); ctx.stroke();
    ctx.fillStyle="#f0a6b8"; ctx.strokeStyle=ink; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(-62,47,8,4,0.6,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // ---- head ----
    ctx.fillStyle="#ffe1c8"; ctx.strokeStyle=ink; ctx.lineWidth=3.2;
    ctx.beginPath(); ctx.arc(0,-34,30,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // hair
    ctx.fillStyle="#5b4636";
    ctx.beginPath(); ctx.arc(0,-34,30,Math.PI*1.08,Math.PI*-0.08);
    ctx.quadraticCurveTo(18,-46,0,-50); ctx.quadraticCurveTo(-18,-46,-30,-34); ctx.closePath(); ctx.fill();
    // sakura hair clip (player side)
    drawSakura(-20,-50,6.5);
    // happy eyes (friendly, looking left)
    ctx.strokeStyle="#3a2630"; ctx.lineWidth=3; ctx.fillStyle="none";
    ctx.beginPath(); ctx.arc(-14,-32,5,Math.PI*1.15,Math.PI*1.95); ctx.stroke();
    ctx.beginPath(); ctx.arc(4,-32,5,Math.PI*1.15,Math.PI*1.95); ctx.stroke();
    // rosy cheeks
    ctx.fillStyle="rgba(240,140,160,.55)";
    ctx.beginPath(); ctx.arc(-18,-24,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,-24,5,0,Math.PI*2); ctx.fill();
    // friendly smile
    ctx.strokeStyle="#7a4a52"; ctx.lineWidth=2.6;
    ctx.beginPath(); ctx.arc(-5,-24,8,Math.PI*0.15,Math.PI*0.85); ctx.stroke();
    ctx.restore();
  }
  function drawBossBar(b){
    const bw=320, bh=12, bx=W/2-bw/2, by=42;
    ctx.fillStyle="rgba(255,255,255,.6)"; roundRect(bx-3,by-3,bw+6,bh+6,8); ctx.fill();
    ctx.fillStyle="#e6b8d8"; roundRect(bx,by,bw,bh,6); ctx.fill();
    const ratio=Math.max(0,b.hp/b.maxHp);
    ctx.fillStyle="#e2447f"; roundRect(bx,by,bw*ratio,bh,6); ctx.fill();
    ctx.fillStyle="#c34d6c"; ctx.font="bold 13px sans-serif"; ctx.textAlign="center";
    ctx.fillText("🩺 ドクターボス", W/2, by-6);
  }

  // ---------- bones (player bullets) + weapon levels ----------
  function pushBone(x,y,vx,vy){ bones.push({x,y,vx,vy,w:16,h:6,rot:0}); }
  function fire(){
    if (player.cooldown>0) return;
    const bx = player.x+40, by = player.y-8, sp = 9;
    if (powerLevel<=1){ pushBone(bx,by,sp,0); }
    else if (powerLevel===2){ pushBone(bx,by-8,sp,0); pushBone(bx,by+8,sp,0); }
    else if (powerLevel===3){ pushBone(bx,by,sp,0); pushBone(bx,by-6,sp,-2.4); pushBone(bx,by+6,sp,2.4); }
    else { pushBone(bx,by,sp,0); pushBone(bx,by-6,sp,-2.2); pushBone(bx,by+6,sp,2.2);
           pushBone(bx,by-10,sp,-4.6); pushBone(bx,by+10,sp,4.6); }
    player.cooldown = rapidTimer>0 ? 7 : 15;
  }
  function drawBoneBullet(b){
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot);
    ctx.fillStyle="#fff7e6"; ctx.strokeStyle="#5a3a44"; ctx.lineWidth=2;
    const h=5;
    ctx.beginPath();
    ctx.arc(-7,0,h*0.7,0,Math.PI*2); ctx.arc(-7,-h,h*0.7,0,Math.PI*2);
    ctx.arc(7,0,h*0.7,0,Math.PI*2); ctx.arc(7,-h,h*0.7,0,Math.PI*2);
    ctx.fill(); ctx.fillRect(-7,-h-1,14,h+2);
    ctx.restore();
  }

  // ---------- items ----------
  function maybeDropItem(x,y){
    const r = Math.random();
    if (r < 0.18) spawnItem(x,y,"power");
    else if (r < 0.30) spawnItem(x,y,"rapid");
    else if (r < 0.40) spawnItem(x,y,"barrier");
    else if (r < 0.48) spawnItem(x,y,"heart");
  }
  function spawnItem(x,y,type){ items.push({ x, y, vx:-1.4, type, t:Math.random()*6 }); }
  function applyItem(type){
    if (type==="power") powerLevel = Math.min(4, powerLevel+1);
    else if (type==="rapid") rapidTimer = 600;
    else if (type==="barrier") barrierTimer = 540;
    else if (type==="heart") lives = Math.min(5, lives+1);
    score += 25;
  }
  function drawItem(it){
    const s = 1 + Math.sin(it.t)*0.08;
    ctx.save(); ctx.translate(it.x, it.y); ctx.scale(s,s);
    ctx.lineWidth = 2.5; ctx.strokeStyle = "#5b3a45";
    let bg = "#ffcf5a";
    if (it.type==="rapid") bg = "#bfe0f5";
    if (it.type==="barrier") bg = "#a9e8e0";
    if (it.type==="heart") bg = "#ffd1dd";
    ctx.fillStyle = bg; roundRect(-13,-13,26,26,8); ctx.fill(); ctx.stroke();
    if (it.type==="power"){
      ctx.fillStyle="#fff7e6"; ctx.save(); ctx.rotate(-0.4); roundedBone(-7,-3,14,4); ctx.restore();
    } else if (it.type==="rapid"){
      ctx.save(); ctx.scale(0.9,0.9); ctx.translate(2,-7); drawSyringe(-3,0); ctx.restore();
    } else if (it.type==="barrier"){
      ctx.strokeStyle="#2f7d76"; ctx.lineWidth=2.4; ctx.fillStyle="#dffbf6";
      ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(8,-5); ctx.lineTo(8,3);
      ctx.quadraticCurveTo(8,9,0,11); ctx.quadraticCurveTo(-8,9,-8,3); ctx.lineTo(-8,-5);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillStyle="#e85d83";
      ctx.beginPath(); ctx.moveTo(0,-3);
      ctx.bezierCurveTo(8,-11,13,1,0,9); ctx.bezierCurveTo(-13,1,-8,-11,0,-3); ctx.fill();
    }
    ctx.restore();
  }
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function burst(x,y,color){
    for (let i=0;i<10;i++){ particles.push({ x,y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-1, life:1, color, r:2+Math.random()*3 }); }
  }

  // ---------- HUD ----------
  function drawHUD(){
    ctx.fillStyle="#c34d6c"; ctx.font="bold 16px sans-serif";
    ctx.textAlign="left"; ctx.fillText("SCORE "+score, 14, 26);
    ctx.textAlign="right"; ctx.fillText("HIGH "+Math.max(high,score), W-14, 26);
    if (!(boss && boss.alive)){ ctx.textAlign="center"; ctx.fillText("WAVE "+wave, W/2, 26); }
    ctx.textAlign="left";
    for (let i=0;i<lives;i++){ drawHeart(20+i*22, 46, 7); }
    ctx.fillStyle="#c34d6c"; ctx.font="bold 13px sans-serif";
    let wt = "WEAPON Lv." + powerLevel;
    if (rapidTimer>0) wt += "  ⚡RAPID";
    if (barrierTimer>0) wt += "  🛡BARRIER";
    ctx.fillText(wt, 14, H-14);
  }
  function drawHeart(x,y,s){
    ctx.save(); ctx.translate(x,y); ctx.fillStyle="#e85d83";
    ctx.beginPath(); ctx.moveTo(0,s*0.35);
    ctx.bezierCurveTo(s,-s*0.6,s*1.4,s*0.4,0,s*1.1);
    ctx.bezierCurveTo(-s*1.4,s*0.4,-s,-s*0.6,0,s*0.35);
    ctx.fill(); ctx.restore();
  }
  function drawBarrier(now){
    const r = 56 + Math.sin(now*0.01)*2;
    ctx.save(); ctx.translate(player.x, player.y);
    ctx.strokeStyle = "rgba(80,200,190,.85)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
    const grd = ctx.createRadialGradient(0,0,r*0.4, 0,0,r);
    grd.addColorStop(0,"rgba(170,232,224,0)"); grd.addColorStop(1,"rgba(120,220,210,.35)");
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function hit(ax,ay,aw,ah, bx,by,bw,bh){ return Math.abs(ax-bx)<(aw+bw)/2 && Math.abs(ay-by)<(ah+bh)/2; }

  function damagePlayer(px,py){
    if (barrierTimer>0){ burst(px,py,"#a9e8e0"); return; }
    if (flashTimer>0) return;            // brief invincibility frames
    lives--; flashTimer=40; burst(player.x,player.y,"#ffd1dd");
    if (lives<=0) gameOver();
  }

  function startGame(){
    score=0; wave=1; lives=3; powerLevel=1; rapidTimer=0; barrierTimer=0; clearTime=0;
    bones=[]; enemyShots=[]; particles=[]; enemies=[]; items=[]; boss=null;
    player.x=110; player.y=H/2; player.cooldown=0; flashTimer=0;
    spawnWave(); state=STATE.PLAY;
    document.getElementById("startPanel").classList.add("hidden");
    document.getElementById("overPanel").classList.add("hidden");
    document.getElementById("clearPanel").classList.add("hidden");
  }
  function gameOver(){
    state=STATE.OVER;
    if (score>high){ high=score; saveHigh(high); }
    document.getElementById("finalScore").textContent=score;
    document.getElementById("finalHigh").textContent=high;
    document.getElementById("overPanel").classList.remove("hidden");
  }
  function showClear(){
    state=STATE.CLEAR; clearTime=0;
    if (score>high){ high=score; saveHigh(high); }
    document.getElementById("clearScore").textContent=score;
    document.getElementById("clearHigh").textContent=high;
    document.getElementById("clearPanel").classList.remove("hidden");
    // firework burst
    const cols=["#ff90ad","#ffd24a","#a9e8e0","#c98bd6","#8fbef0","#f29ad0","#fff7e6"];
    for(let i=0;i<60;i++){
      const ang=Math.random()*Math.PI*2, spd=2+Math.random()*5;
      particles.push({ x:W/2+(Math.random()-0.5)*200, y:H/2+(Math.random()-0.5)*100,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
        life:1, color:cols[Math.floor(Math.random()*cols.length)], r:3+Math.random()*4 });
    }
  }

  function update(now){
    updatePetals();
    for (const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.03; }
    particles = particles.filter(p=>p.life>0);
    if (state!==STATE.PLAY) return;
    if (flashTimer>0) flashTimer--;
    if (rapidTimer>0) rapidTimer--;
    if (barrierTimer>0) barrierTimer--;

    // player move
    if (keys.left) player.x-=player.speed;
    if (keys.right) player.x+=player.speed;
    if (keys.up) player.y-=player.speed;
    if (keys.down) player.y+=player.speed;
    player.x = Math.max(50, Math.min(W*0.5, player.x));
    player.y = Math.max(46, Math.min(H-46, player.y));
    if (player.cooldown>0) player.cooldown--;
    if (keys.fire) fire();

    // bones
    for (const b of bones){ b.x+=b.vx; b.y+=b.vy; b.rot+=0.4; }
    bones = bones.filter(b=>b.x<W+20 && b.y>-30 && b.y<H+30);

    // ---- spawn / boss control ----
    if (boss && boss.alive){
      boss.t += 0.05;
      if (boss.enter){ boss.x -= 3; if (boss.x<=boss.tx){ boss.x=boss.tx; boss.enter=false; } }
      else {
        boss.y += boss.vy;
        if (boss.y<120){ boss.y=120; boss.vy*=-1; } if (boss.y>H-120){ boss.y=H-120; boss.vy*=-1; }
        boss.fireT--;
        if (boss.fireT<=0){
          for (let i=-2;i<=2;i++){ enemyShots.push({ x:boss.x-58, y:boss.y+i*9, w:11, h:9, vx:-(3.0+wave*0.12), vy:i*0.7, pill:true }); }
          const dx=player.x-(boss.x-58), dy=player.y-boss.y, d=Math.hypot(dx,dy)||1;
          enemyShots.push({ x:boss.x-58, y:boss.y, w:11, h:9, vx:dx/d*4.4, vy:dy/d*4.4, pill:true });
          boss.fireT = Math.max(42, 84 - wave*2);
        }
      }
    } else {
      if (toSpawn>0){ spawnTimer--; if (spawnTimer<=0){ spawnEnemy(); toSpawn--; spawnTimer=Math.max(26,62-wave*4); } }
      else if (enemies.length===0 && !boss){
        if (wave>=5){ showClear(); return; }
        wave++; spawnWave(); return;
      }
    }

    // move enemies
    for (const e of enemies){
      e.x+=e.vx; e.y=e.baseY+Math.sin(now*0.003+e.wob)*e.amp; e.fireT--;
      if (e.fireT<=0 && e.x<W-20 && e.x>70){
        enemyShots.push({ x:e.x-12, y:e.y, w:8, h:8, vx:-(3.2+wave*0.2), vy:0 });
        e.fireT = 70+Math.random()*80;
      }
    }
    for (const e of enemies){ if (e.x<-40 && e.alive){ e.alive=false; lives--; flashTimer=20; if (lives<=0){ gameOver(); } } }
    enemies = enemies.filter(e=>e.alive && e.x>=-40);
    if (state!==STATE.PLAY) return;

    // bone vs enemy
    for (const b of bones){
      for (const e of enemies){
        if (e.alive && hit(b.x,b.y,b.w,b.h, e.x,e.y,e.w,e.h)){
          e.alive=false; b.x=W+999; score+=10*wave;
          burst(e.x,e.y, e.type==="bug"?"#8fbef0":(e.type==="jelly"?"#c98bd6":"#f29ad0"));
          maybeDropItem(e.x,e.y); break;
        }
      }
    }
    bones = bones.filter(b=>b.x<W+20);
    enemies = enemies.filter(e=>e.alive);

    // bone vs boss
    if (boss && boss.alive){
      for (const b of bones){
        if (hit(b.x,b.y,b.w,b.h, boss.x,boss.y, boss.w*0.8, boss.h*0.8)){
          b.x=W+999; boss.hp--; score+=2; if (Math.random()<0.4) burst(b.x,b.y,"#e9a6d6");
        }
      }
      bones = bones.filter(b=>b.x<W+20);
      if (boss.hp<=0){
        for (let i=0;i<5;i++) burst(boss.x+(Math.random()-0.5)*60, boss.y+(Math.random()-0.5)*60, "#d98ad0");
        score += 200 + wave*40;
        spawnItem(boss.x, boss.y, "power");
        spawnItem(boss.x, boss.y-34, "heart");
        spawnItem(boss.x, boss.y+34, "barrier");
        boss = null;
      }
    }

    // enemy body vs player
    for (const e of enemies){
      if (hit(e.x,e.y,e.w*0.7,e.h*0.7, player.x,player.y,player.w*0.5,player.h*0.5)){
        e.alive=false;
        if (barrierTimer>0){ burst(e.x,e.y,"#a9e8e0"); score+=5; }
        else damagePlayer(e.x,e.y);
        if (state!==STATE.PLAY) return;
      }
    }
    enemies = enemies.filter(e=>e.alive);

    // boss body vs player
    if (boss && boss.alive && !boss.enter){
      if (hit(boss.x,boss.y,boss.w*0.6,boss.h*0.6, player.x,player.y,player.w*0.5,player.h*0.5)){
        damagePlayer(player.x,player.y);
        if (state!==STATE.PLAY) return;
      }
    }

    // enemy shots
    for (const s of enemyShots){ s.x+=s.vx; s.y+=(s.vy||0); }
    enemyShots = enemyShots.filter(s=>s.x>-20 && s.x<W+40 && s.y>-30 && s.y<H+30);
    for (const s of enemyShots){
      if (hit(s.x,s.y,s.w,s.h, player.x,player.y,player.w*0.45,player.h*0.45)){
        s.x=-999;
        if (barrierTimer>0) burst(player.x,player.y,"#a9e8e0");
        else damagePlayer(player.x,player.y);
        if (state!==STATE.PLAY) return;
      }
    }
    enemyShots = enemyShots.filter(s=>s.x>-20);

    // items
    for (const it of items){ it.x+=it.vx; it.t+=0.12; }
    items = items.filter(it=>it.x>-30);
    for (const it of items){
      if (hit(it.x,it.y,24,24, player.x,player.y,player.w*0.55,player.h*0.55)){
        applyItem(it.type); it.x=-999; burst(player.x,player.y,"#fff0a0");
      }
    }
    items = items.filter(it=>it.x>-30);
  }

  function render(now){
    ctx.clearRect(0,0,W,H);
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#ffe3ec"); g.addColorStop(1,"#fbcad9");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for (const p of petals) drawPetal(p);

    if (state===STATE.PLAY || state===STATE.OVER){
      if (boss && boss.alive) drawBoss(boss);
      for (const e of enemies){ if (e.alive) drawEnemy(e); }
      for (const it of items) drawItem(it);
      for (const b of bones) drawBoneBullet(b);
      for (const s of enemyShots){
        ctx.save(); ctx.translate(s.x,s.y);
        if (s.pill){
          ctx.rotate(Math.atan2(s.vy||0, s.vx));
          ctx.lineWidth=1.6; ctx.strokeStyle="#9a4a6a";
          ctx.fillStyle="#ffd1dd"; roundRect(-7,-4,14,8,4); ctx.fill();
          ctx.fillStyle="#fff"; roundRect(-7,-4,7,8,4); ctx.fill();
          roundRect(-7,-4,14,8,4); ctx.stroke();
        } else {
          ctx.fillStyle="#d65f84"; ctx.beginPath(); ctx.ellipse(0,0,7,4,0,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      if (!(flashTimer>0 && Math.floor(flashTimer/4)%2===0)) drawDino(player.x, player.y, flashTimer>0);
      if (barrierTimer>0) drawBarrier(now);
      // ---- hitbox indicator ----
      const hw=player.w*0.45, hh=player.h*0.45;
      ctx.save(); ctx.translate(player.x, player.y);
      ctx.setLineDash([4,3]);
      ctx.strokeStyle="rgba(255,255,255,0.75)"; ctx.lineWidth=1.6;
      roundRect(-hw/2,-hh/2,hw,hh,6); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="rgba(255,80,120,0.9)";
      ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
      drawHUD();
      if (boss && boss.alive && !boss.enter) drawBossBar(boss);
    }
    // ---- CLEAR screen ----
    if (state===STATE.CLEAR){
      clearTime++;
      // big Naorusu bouncing at center
      const bounce = Math.sin(clearTime*0.08)*8;
      ctx.save(); ctx.translate(W/2, H/2+20+bounce); ctx.scale(2.2,2.2);
      drawDino(0,0,false);
      ctx.restore();
      // sparkle stars
      if (clearTime%8===0){
        const cols=["#ff90ad","#ffd24a","#a9e8e0","#c98bd6"];
        for(let i=0;i<6;i++){
          const ang=Math.random()*Math.PI*2, spd=1.5+Math.random()*3;
          particles.push({ x:W/2+(Math.random()-0.5)*300, y:H/2+(Math.random()-0.5)*180,
            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1,
            life:1, color:cols[Math.floor(Math.random()*cols.length)], r:2+Math.random()*3 });
        }
      }
    }
    for (const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1;
  }

  function loop(now){ update(now); render(now); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  // ---------- input ----------
  window.addEventListener("keydown", e=>{
    if (e.code==="ArrowLeft") keys.left=true;
    if (e.code==="ArrowRight") keys.right=true;
    if (e.code==="ArrowUp"){ keys.up=true; e.preventDefault(); }
    if (e.code==="ArrowDown"){ keys.down=true; e.preventDefault(); }
    if (e.code==="Space"){ keys.fire=true; e.preventDefault(); if (state===STATE.START) startGame(); }
    if (e.code==="Enter" && state!==STATE.PLAY) startGame();
    if (e.code==="Space" && state===STATE.CLEAR){ startGame(); e.preventDefault(); }
  });
  window.addEventListener("keyup", e=>{
    if (e.code==="ArrowLeft") keys.left=false;
    if (e.code==="ArrowRight") keys.right=false;
    if (e.code==="ArrowUp") keys.up=false;
    if (e.code==="ArrowDown") keys.down=false;
    if (e.code==="Space") keys.fire=false;
  });
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);
  document.getElementById("clearBtn").addEventListener("click", startGame);

  function bindHold(id,on,off){
    const el=document.getElementById(id);
    let active=false;
    const press=e=>{ if(e) e.preventDefault(); if(active) return; active=true; el.classList.add("pressed"); on(); };
    const release=e=>{ if(e) e.preventDefault(); if(!active) return; active=false; el.classList.remove("pressed"); off(); };
    if (window.PointerEvent){
      el.addEventListener("pointerdown",e=>{ press(e); try{ el.setPointerCapture(e.pointerId); }catch(_){} },{passive:false});
      el.addEventListener("pointerup",release,{passive:false});
      el.addEventListener("pointercancel",release,{passive:false});
      el.addEventListener("lostpointercapture",release,{passive:false});
    } else {
      el.addEventListener("touchstart",press,{passive:false});
      el.addEventListener("touchend",release,{passive:false});
      el.addEventListener("touchcancel",release,{passive:false});
      el.addEventListener("mousedown",press); el.addEventListener("mouseup",release); el.addEventListener("mouseleave",release);
    }
  }
  bindHold("leftBtn",()=>keys.left=true,()=>keys.left=false);
  bindHold("rightBtn",()=>keys.right=true,()=>keys.right=false);
  bindHold("upBtn",()=>keys.up=true,()=>keys.up=false);
  bindHold("downBtn",()=>keys.down=true,()=>keys.down=false);
  bindHold("fireBtn",()=>keys.fire=true,()=>keys.fire=false);
})();
</script>
</body>
